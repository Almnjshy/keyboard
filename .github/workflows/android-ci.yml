name: Android CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup JDK 17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Setup Gradle (handles missing gradlew)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.7

      # 4. Check if gradlew exists, if not use gradle directly
      - name: Check Gradle Wrapper
        id: check_wrapper
        run: |
          if [ -f "gradlew" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            chmod +x gradlew
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "⚠️ gradlew not found, will use system gradle"
          fi

      # 5. Run build with wrapper or system gradle
      - name: Build Debug APK
        run: |
          if [ "${{ steps.check_wrapper.outputs.exists }}" == "true" ]; then
            ./gradlew assembleDebug
          else
            gradle assembleDebug
          fi

      # 6. Run tests
      - name: Run Unit Tests
        run: |
          if [ "${{ steps.check_wrapper.outputs.exists }}" == "true" ]; then
            ./gradlew testDebugUnitTest
          else
            gradle testDebugUnitTest
          fi

      # 7. Upload debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: app/build/outputs/apk/debug/*.apk

      # 8. Build release
      - name: Build Release APK
        run: |
          if [ "${{ steps.check_wrapper.outputs.exists }}" == "true" ]; then
            ./gradlew assembleRelease
          else
            gradle assembleRelease
          fi

      # 9. Upload release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/release/*.apk